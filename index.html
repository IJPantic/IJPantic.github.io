<!-- Redirects to different main page based on screen size (mobile or desktop device) -->

<html>
    <head>
        <script>
            if (window.innerWidth >= window.innerHeight ) {
                window.location.href = "desktop/main/main.html";
            }else {
                window.location.href = "mobile/main/main.html";
            }
        </script>
    </head>
</html>
